<mat-toolbar>
  <button mat-icon-button>
    <mat-icon (click)="changeExpanded()">menu</mat-icon>
  </button>

  <span class="title no-selected">Orangotango</span>
  <span class="spacer"></span>

  <app-notifications></app-notifications>

  <button mat-icon-button>
    <mat-icon matTooltip="Opções" [matMenuTriggerFor]="menu"
      >more_vert</mat-icon
    >
  </button>

  <mat-menu #menu="matMenu" xPosition="before">
    <nav mat-menu-item>
      <mat-label class="center-mat-label name">{{ name }}</mat-label>
    </nav>

    <nav mat-menu-item>
      <mat-icon>catching_pokemon</mat-icon>
      <mat-label>Minha Conta</mat-label>
    </nav>

    <mat-divider></mat-divider>

    <nav mat-menu-item (click)="logoff()">
      <mat-icon>login</mat-icon>
      <mat-label>Sair</mat-label>
    </nav>
  </mat-menu>
</mat-toolbar>
